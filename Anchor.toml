[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
lightindark_v2 = "6CvCAte9SsfB34yWcpshY3Do2d7VqkLfHCRbHBsv6zar"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
initialize-season = "npx ts-node scripts/initialize-season.ts"
activate-season = "npx ts-node scripts/activate-season.ts"
check-season = "npx ts-node scripts/check-season.ts"
distribute-rewards = "npx ts-node scripts/distribute-rewards.ts"
airdrop-lid = "npx ts-node scripts/airdrop-lid.ts"
